<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> LeetCode: Search in Rotated Sorted Array · 疯狂de咸蛋</title><meta name="description" content="LeetCode: Search in Rotated Sorted Array - Salty Egg"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="https://hzhou.me/atom.xml" title="疯狂de咸蛋"><script src="https://use.fontawesome.com/0a81c537eb.js">   </script><script src="//code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/logo.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="/tags/" target="_self" class="nav-list-link">TAG</a></li><li class="nav-list-item"><a href="/about/" target="_self" class="nav-list-link">ABOUT</a></li><li class="nav-list-item"><a href="/LeetCode/" target="_self" class="nav-list-link active">LEETCODE</a></li><li class="nav-list-item"><a href="https://github.com/zhouhao" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li><li class="nav-list-item"><a href="/search" target="_self" class="nav-list-link search"><i class="fa fa-search" aria-hidden="true"></i></a></li></ul></header><main class="container"></main><div class="post"><article class="post-block"><h1 class="post-title">LeetCode: Search in Rotated Sorted Array</h1><div class="post-info">Jun 24, 2015</div><div class="post-content"><figure class="highlight java"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div><div class="line">48</div><div class="line">49</div><div class="line">50</div><div class="line">51</div><div class="line">52</div><div class="line">53</div><div class="line">54</div><div class="line">55</div><div class="line">56</div><div class="line">57</div><div class="line">58</div><div class="line">59</div><div class="line">60</div><div class="line">61</div><div class="line">62</div><div class="line">63</div><div class="line">64</div><div class="line">65</div><div class="line">66</div><div class="line">67</div><div class="line">68</div><div class="line">69</div><div class="line">70</div><div class="line">71</div><div class="line">72</div><div class="line">73</div><div class="line">74</div><div class="line">75</div><div class="line">76</div><div class="line">77</div><div class="line">78</div><div class="line">79</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">import</span> <span class="keyword">static</span> org.junit.Assert.assertSame;</div><div class="line"><span class="comment">/**</span></div><div class="line"> * Created by hzhou on 2015/5/26.</div><div class="line"> * Email: codeashobby@gmail.com</div><div class="line"> * &lt;p&gt;</div><div class="line"> * Suppose a sorted array is rotated at some pivot unknown to you beforehand.</div><div class="line"> * &lt;p&gt;</div><div class="line"> * (i.e., 0 1 2 4 5 6 7 might become 4 5 6 7 0 1 2).</div><div class="line"> * &lt;p&gt;</div><div class="line"> * You are given a target value to search. If found in the array return its index, otherwise return -1.</div><div class="line"> * &lt;p&gt;</div><div class="line"> * You may assume no duplicate exists in the array.</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">SearchInRotatedSortedArray</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">int</span> <span class="title">search</span><span class="params">(<span class="keyword">int</span>[] nums, <span class="keyword">int</span> target)</span> </span>&#123;</div><div class="line">        <span class="keyword">if</span> (nums == <span class="keyword">null</span> || nums.length == <span class="number">0</span>) &#123;</div><div class="line">            <span class="keyword">return</span> -<span class="number">1</span>;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">int</span> pivot = getPivot(nums);</div><div class="line">        <span class="keyword">if</span> (pivot == -<span class="number">1</span>) &#123;</div><div class="line">            <span class="keyword">return</span> binarySearch(<span class="number">0</span>, nums.length - <span class="number">1</span>, nums, target);</div><div class="line">        &#125; <span class="keyword">else</span> &#123;</div><div class="line">            <span class="keyword">int</span> l = binarySearch(<span class="number">0</span>, pivot - <span class="number">1</span>, nums, target);</div><div class="line">            <span class="keyword">if</span> (l != -<span class="number">1</span>) &#123;</div><div class="line">                <span class="keyword">return</span> l;</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                <span class="keyword">return</span> binarySearch(pivot, nums.length - <span class="number">1</span>, nums, target);</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> <span class="keyword">int</span> <span class="title">getPivot</span><span class="params">(<span class="keyword">int</span>[] nums)</span> </span>&#123;</div><div class="line">        <span class="keyword">int</span> start = <span class="number">0</span>;</div><div class="line">        <span class="keyword">int</span> end = nums.length - <span class="number">1</span>;</div><div class="line">        <span class="keyword">if</span> (nums[start] &lt; nums[end]) &#123;</div><div class="line">            <span class="keyword">return</span> -<span class="number">1</span>;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">while</span> (start &lt; end) &#123;</div><div class="line">            <span class="keyword">if</span> (start + <span class="number">1</span> &gt;= end) &#123;</div><div class="line">                <span class="keyword">return</span> nums[start] &lt; nums[end] ? start : end;</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">int</span> middle = (start + end) / <span class="number">2</span>;</div><div class="line">            <span class="keyword">if</span> (nums[middle] &lt; nums[middle - <span class="number">1</span>] &amp;&amp; nums[middle] &lt; nums[middle + <span class="number">1</span>]) &#123;</div><div class="line">                <span class="keyword">return</span> middle;</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">if</span> (nums[start] &lt; nums[middle]) &#123;</div><div class="line">                start = middle;</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                end = middle;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> <span class="number">0</span>;</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> <span class="keyword">int</span> <span class="title">binarySearch</span><span class="params">(<span class="keyword">int</span> start, <span class="keyword">int</span> end, <span class="keyword">int</span>[] nums, <span class="keyword">int</span> target)</span> </span>&#123;</div><div class="line">        <span class="keyword">while</span> (start &lt;= end) &#123;</div><div class="line">            <span class="keyword">int</span> middle = (start + end) / <span class="number">2</span>;</div><div class="line">            <span class="keyword">if</span> (nums[middle] == target) &#123;</div><div class="line">                <span class="keyword">return</span> middle;</div><div class="line">            &#125; <span class="keyword">else</span> <span class="keyword">if</span> (nums[middle] &gt; target) &#123;</div><div class="line">                end = middle - <span class="number">1</span>;</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                start = middle + <span class="number">1</span>;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> -<span class="number">1</span>;</div><div class="line">    &#125;</div><div class="line">    <span class="meta">@Test</span></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;</div><div class="line">        <span class="keyword">int</span>[] nums = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">4</span>, <span class="number">5</span>, <span class="number">6</span>, <span class="number">7</span>, <span class="number">9</span>&#125;;</div><div class="line">        assertSame(<span class="number">2</span>, binarySearch(<span class="number">0</span>, <span class="number">5</span>, nums, <span class="number">6</span>));</div><div class="line">        assertSame(-<span class="number">1</span>, binarySearch(<span class="number">0</span>, <span class="number">5</span>, nums, <span class="number">3</span>));</div><div class="line">        nums = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">4</span>&#125;;</div><div class="line">        assertSame(<span class="number">0</span>,getPivot(nums));</div><div class="line">        nums = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">4</span>,<span class="number">1</span>&#125;;</div><div class="line">        assertSame(<span class="number">1</span>,getPivot(nums));</div><div class="line">        nums = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">4</span>,<span class="number">5</span>&#125;;</div><div class="line">        assertSame(-<span class="number">1</span>,getPivot(nums));</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
