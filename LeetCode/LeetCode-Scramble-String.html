ne">                        canScramble = (scramble[m - <span class="number">1</span>][i][j] &amp;&amp; scramble[k - m - <span class="number">1</span>][i + m][j + m]) || (</div><div class="line">                                scramble[m - <span class="number">1</span>][i][j + k - m] &amp;&amp; scramble[k - m - <span class="number">1</span>][i + m][j]);</div><div class="line">                        <span class="keyword">if</span> (canScramble) &#123;</div><div class="line">                            <span class="keyword">break</span>;</div><div class="line">                        &#125;</div><div class="line">                    &#125;</div><div class="line">                    scramble[k - <span class="number">1</span>][i][j] = canScramble;</div><div class="line">                &#125;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> scramble[L - <span class="number">1</span>][<span class="number">0</span>][<span class="number">0</span>];</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
