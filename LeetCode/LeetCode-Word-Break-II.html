ine">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div><div class="line">48</div><div class="line">49</div><div class="line">50</div><div class="line">51</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">WordBreakII</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> List&lt;String&gt; <span class="title">wordBreak</span><span class="params">(String s, Set&lt;String&gt; wordDict)</span> </span>&#123;</div><div class="line">        List&lt;String&gt; result = <span class="keyword">new</span> ArrayList&lt;String&gt;();</div><div class="line">        <span class="keyword">if</span> (s == <span class="keyword">null</span> || s.isEmpty()) &#123;</div><div class="line">            <span class="keyword">return</span> result;</div><div class="line">        &#125;</div><div class="line">        List&lt;String&gt; map[] = <span class="keyword">new</span> ArrayList[s.length() + <span class="number">1</span>];</div><div class="line">        map[<span class="number">0</span>] = <span class="keyword">new</span> ArrayList&lt;String&gt;();</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; s.length(); i++) &#123;</div><div class="line">            <span class="keyword">if</span> (map[i] == <span class="keyword">null</span>) &#123;</div><div class="line">                <span class="keyword">continue</span>;</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">for</span> (String str : wordDict) &#123;</div><div class="line">                <span class="keyword">int</span> l = str.length();</div><div class="line">                <span class="keyword">int</span> end = i + l;</div><div class="line">                <span class="keyword">if</span> (end &gt; s.length()) &#123;</div><div class="line">                    <span class="keyword">continue</span>;</div><div class="line">                &#125;</div><div class="line">                <span class="keyword">if</span> (s.substring(i, end).equals(str)) &#123;</div><div class="line">                    <span class="keyword">if</span> (map[end] == <span class="keyword">null</span>) &#123;</div><div class="line">                        map[end] = <span class="keyword">new</span> ArrayList&lt;String&gt;();</div><div class="line">                    &#125;</div><div class="line">                    map[end].add(str);</div><div class="line">                &#125;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">if</span> (map[s.length()] == <span class="keyword">null</span>) &#123;</div><div class="line">            <span class="keyword">return</span> result;</div><div class="line">        &#125;</div><div class="line">        helper(s.length(), result, <span class="keyword">new</span> ArrayList&lt;String&gt;(), map);</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line">    </div><div class="line">    <span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">helper</span><span class="params">(<span class="keyword">int</span> end, List&lt;String&gt; result, List&lt;String&gt; crt, List&lt;String&gt; map[])</span> </span>&#123;</div><div class="line">        <span class="keyword">if</span> (end &lt;= <span class="number">0</span>) &#123;</div><div class="line">            StringBuilder sb = <span class="keyword">new</span> StringBuilder();</div><div class="line">            <span class="keyword">for</span> (<span class="keyword">int</span> i = crt.size() - <span class="number">1</span>; i &gt;= <span class="number">0</span>; i--) &#123;</div><div class="line">                String s = crt.get(i);</div><div class="line">                sb.append(s).append(<span class="string">' '</span>);</div><div class="line">            &#125;</div><div class="line">            sb.deleteCharAt(sb.length() - <span class="number">1</span>);<span class="comment">// remove end empty space</span></div><div class="line">            result.add(sb.toString());</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">for</span> (String s : map[end]) &#123;</div><div class="line">            List&lt;String&gt; tmp = <span class="keyword">new</span> ArrayList&lt;String&gt;(crt);</div><div class="line">            tmp.add(s);</div><div class="line">            helper(end - s.length(), result, tmp, map);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
