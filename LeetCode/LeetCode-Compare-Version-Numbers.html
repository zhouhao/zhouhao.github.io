s="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="comment">/**</span></div><div class="line"> * Created by hzhou on 4/21/15. codeashobby@gmail.com</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">CompareVersionNumbers</span> </span>&#123;</div><div class="line">    <span class="keyword">private</span> <span class="keyword">static</span> <span class="keyword">final</span> Logger log = Logger.getLogger(CompareVersionNumbers.class);</div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">int</span> <span class="title">compareVersion</span><span class="params">(String version1, String version2)</span> </span>&#123;</div><div class="line">        <span class="keyword">assert</span> version1 != <span class="keyword">null</span>;</div><div class="line">        <span class="keyword">assert</span> version2 != <span class="keyword">null</span>;</div><div class="line">        version1 = version1.trim();</div><div class="line">        version2 = version2.trim();</div><div class="line">        String[] v1 = version1.split(<span class="string">"\\."</span>);</div><div class="line">        String[] v2 = version2.split(<span class="string">"\\."</span>);</div><div class="line">        <span class="keyword">int</span> result = <span class="number">0</span>;</div><div class="line">        <span class="keyword">int</span> l1 = v1.length;</div><div class="line">        <span class="keyword">int</span> l2 = v2.length;</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; Math.max(l1, l2); i++) &#123;</div><div class="line">            <span class="keyword">int</span> a = ((l1 &lt;= i) || v1[i].isEmpty()) ? <span class="number">0</span> : Integer.valueOf(v1[i]);</div><div class="line">            <span class="keyword">int</span> b = ((l2 &lt;= i) || v2[i].isEmpty()) ? <span class="number">0</span> : Integer.valueOf(v2[i]);</div><div class="line">            <span class="keyword">if</span> (a &gt; b) &#123;</div><div class="line">                result = <span class="number">1</span>;</div><div class="line">                <span class="keyword">break</span>;</div><div class="line">            &#125; <span class="keyword">else</span> <span class="keyword">if</span> (a &lt; b) &#123;</div><div class="line">                result = -<span class="number">1</span>;</div><div class="line">                <span class="keyword">break</span>;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line">    <span class="meta">@Test</span></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;</div><div class="line">        String[] strs = <span class="string">"22.33"</span>.split(<span class="string">"\\."</span>);</div><div class="line">        <span class="keyword">for</span> (String str : strs) &#123;</div><div class="line">            log.info(str);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
