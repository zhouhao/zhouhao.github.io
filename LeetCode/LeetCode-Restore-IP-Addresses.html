<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> LeetCode: Restore IP Addresses · 疯狂de咸蛋</title><meta name="description" content="LeetCode: Restore IP Addresses - Salty Egg"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="https://hzhou.me/atom.xml" title="疯狂de咸蛋"><script src="//code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/logo.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="/tags/" target="_self" class="nav-list-link">TAG</a></li><li class="nav-list-item"><a href="/about/" target="_self" class="nav-list-link">ABOUT</a></li><li class="nav-list-item"><a href="/LeetCode/" target="_self" class="nav-list-link active">LEETCODE</a></li><li class="nav-list-item"><a href="https://github.com/zhouhao" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"></main><div class="post"><article class="post-block"><h1 class="post-title">LeetCode: Restore IP Addresses</h1><div class="post-info">Jun 24, 2015</div><div class="post-content"><figure class="highlight java"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div><div class="line">48</div><div class="line">49</div><div class="line">50</div><div class="line">51</div><div class="line">52</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="comment">/**</span></div><div class="line"> * Created by hzhou on 2015/5/26.</div><div class="line"> * Email: codeashobby@gmail.com</div><div class="line"> * &lt;p&gt;</div><div class="line"> * Given a string containing only digits, restore it by returning all possible valid IP address combinations.</div><div class="line"> * &lt;p&gt;</div><div class="line"> * For example:</div><div class="line"> * Given "25525511135",</div><div class="line"> * &lt;p&gt;</div><div class="line"> * return ["255.255.11.135", "255.255.111.35"]. (Order does not matter)</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">RestoreIPAddresses</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> List&lt;String&gt; <span class="title">restoreIpAddresses</span><span class="params">(String s)</span> </span>&#123;</div><div class="line">        List&lt;String&gt; result = <span class="keyword">new</span> ArrayList&lt;String&gt;();</div><div class="line">        <span class="keyword">if</span> (s == <span class="keyword">null</span> || s.length() &lt; <span class="number">4</span>) &#123;</div><div class="line">            <span class="keyword">return</span> result;</div><div class="line">        &#125;</div><div class="line">        helper(<span class="number">0</span>, <span class="number">0</span>, s, result, <span class="string">""</span>);</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> <span class="keyword">void</span> <span class="title">helper</span><span class="params">(<span class="keyword">int</span> count, <span class="keyword">int</span> start, String s, List&lt;String&gt; result, String crt)</span> </span>&#123;</div><div class="line">        <span class="keyword">if</span> (count == <span class="number">3</span>) &#123;</div><div class="line">            String sub = s.substring(start, s.length());</div><div class="line">            <span class="keyword">if</span> (isValid(sub)) &#123;</div><div class="line">                result.add(crt + sub);</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">return</span>;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = start + <span class="number">1</span>; i &lt; s.length() &amp;&amp; i &lt; start + <span class="number">4</span>; i++) &#123;</div><div class="line">            String sub = s.substring(start, i);</div><div class="line">            <span class="keyword">if</span> (isValid(sub)) &#123;</div><div class="line">                helper(count + <span class="number">1</span>, i, s, result, crt + sub + <span class="string">"."</span>);</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> <span class="keyword">boolean</span> <span class="title">isValid</span><span class="params">(String s)</span> </span>&#123;</div><div class="line">        <span class="keyword">if</span> (s == <span class="keyword">null</span> || s.isEmpty() || (s.startsWith(<span class="string">"0"</span>) &amp;&amp; s.length() &gt; <span class="number">1</span>)) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="keyword">false</span>;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">int</span> result = <span class="number">0</span>;</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">char</span> c : s.toCharArray()) &#123;</div><div class="line">            result = <span class="number">10</span> * result + c - <span class="string">'0'</span>;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> result &gt;= <span class="number">0</span> &amp;&amp; result &lt; <span class="number">256</span>;</div><div class="line">    &#125;</div><div class="line">    <span class="meta">@Test</span></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;</div><div class="line">        String s = <span class="string">"25525511135"</span>;</div><div class="line">        List&lt;String&gt; result = restoreIpAddresses(s);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
