s="line"> *</div><div class="line"> * <span class="doctag">@author</span> hzhou</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">JumpGameII</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">int</span> <span class="title">jump</span><span class="params">(<span class="keyword">int</span>[] nums)</span> </span>&#123;</div><div class="line">        <span class="keyword">if</span> (nums == <span class="keyword">null</span> || nums.length &lt;= <span class="number">1</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="number">0</span>;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">int</span> jump = <span class="number">1</span>;</div><div class="line">        <span class="keyword">int</span> step = nums[<span class="number">0</span>];</div><div class="line">        <span class="keyword">int</span> maxReach = nums[<span class="number">0</span>];</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">1</span>; i &lt; nums.length-<span class="number">1</span>; i++) &#123;</div><div class="line">            maxReach = Math.max(maxReach, i + nums[i]);</div><div class="line">            step--;</div><div class="line">            <span class="keyword">if</span> (step == <span class="number">0</span>) &#123;</div><div class="line">                step = maxReach - i;</div><div class="line">                jump++;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> jump;</div><div class="line">    &#125;</div><div class="line">    <span class="meta">@Test</span></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;</div><div class="line">        <span class="keyword">int</span>[] nums = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">1</span>,<span class="number">3</span>,<span class="number">2</span>&#125;;</div><div class="line">        <span class="keyword">int</span> result = jump(nums);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
