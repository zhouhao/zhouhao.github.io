v><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="comment">/**</span></div><div class="line"> * Created by hzhou on 2015/5/28.</div><div class="line"> * Email: codeashobby@gmail.com</div><div class="line"> * &lt;p&gt;</div><div class="line"> * Given a sorted array of integers, find the starting and ending position of a given target value.</div><div class="line"> * &lt;p&gt;</div><div class="line"> * Your algorithm's runtime complexity must be in the order of O(log n).</div><div class="line"> * &lt;p&gt;</div><div class="line"> * If the target is not found in the array, return [-1, -1].</div><div class="line"> * &lt;p&gt;</div><div class="line"> * For example,</div><div class="line"> * Given [5, 7, 7, 8, 8, 10] and target value 8,</div><div class="line"> * return [3, 4].</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">SearchForARange</span> </span>&#123;</div><div class="line">    <span class="keyword">public</span> <span class="keyword">int</span>[] searchRange(<span class="keyword">int</span>[] nums, <span class="keyword">int</span> target) &#123;</div><div class="line">        <span class="keyword">int</span>[] result = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;-<span class="number">1</span>, -<span class="number">1</span>&#125;;</div><div class="line">        <span class="keyword">if</span> (nums == <span class="keyword">null</span> || nums.length == <span class="number">0</span> || target &lt; nums[<span class="number">0</span>] || target &gt; nums[nums.length - <span class="number">1</span>]) &#123;</div><div class="line">            <span class="keyword">return</span> result;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; nums.length; i++) &#123;</div><div class="line">            <span class="keyword">if</span> (nums[i] == target) &#123;</div><div class="line">                result[<span class="number">0</span>] = i;</div><div class="line">                <span class="keyword">int</span> crt = nums[i];</div><div class="line">                <span class="keyword">while</span> (nums[i] == crt) &#123;</div><div class="line">                    i++;</div><div class="line">                &#125;</div><div class="line">                result[<span class="number">1</span>] = i - <span class="number">1</span>;</div><div class="line">                <span class="keyword">break</span>;</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
