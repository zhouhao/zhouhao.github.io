v><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div><div class="line">48</div><div class="line">49</div><div class="line">50</div><div class="line">51</div><div class="line">52</div><div class="line">53</div><div class="line">54</div><div class="line">55</div><div class="line">56</div><div class="line">57</div><div class="line">58</div><div class="line">59</div><div class="line">60</div><div class="line">61</div><div class="line">62</div><div class="line">63</div><div class="line">64</div><div class="line">65</div><div class="line">66</div><div class="line">67</div><div class="line">68</div><div class="line">69</div><div class="line">70</div><div class="line">71</div><div class="line">72</div><div class="line">73</div><div class="line">74</div><div class="line">75</div><div class="line">76</div><div class="line">77</div><div class="line">78</div><div class="line">79</div><div class="line">80</div><div class="line">81</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="keyword">import</span> <span class="keyword">static</span> org.junit.Assert.assertSame;</div><div class="line"><span class="comment">/**</span></div><div class="line"> * Description:</div><div class="line"> *</div><div class="line"> * <span class="doctag">@author</span> hzhou</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">TextJustification</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> List&lt;String&gt; <span class="title">fullJustify</span><span class="params">(String[] words, <span class="keyword">int</span> maxWidth)</span> </span>&#123;</div><div class="line">        List&lt;String&gt; result = <span class="keyword">new</span> ArrayList&lt;String&gt;();</div><div class="line">        <span class="keyword">if</span> (words == <span class="keyword">null</span> || words.length == <span class="number">0</span>) &#123;</div><div class="line">            <span class="keyword">return</span> result;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">if</span> (maxWidth == <span class="number">0</span>) &#123;</div><div class="line">            result.add(<span class="string">""</span>);</div><div class="line">            <span class="keyword">return</span> result;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">int</span> crt = <span class="number">0</span>;</div><div class="line">        <span class="keyword">int</span> pre = <span class="number">0</span>;</div><div class="line">        <span class="keyword">int</span> count = <span class="number">0</span>;</div><div class="line">        <span class="keyword">while</span> (pre &lt; words.length) &#123;</div><div class="line">            count = words[crt].length() + <span class="number">1</span>;</div><div class="line">            <span class="keyword">while</span> (count &lt;= maxWidth + <span class="number">1</span> &amp;&amp; crt &lt; words.length - <span class="number">1</span>) &#123;</div><div class="line">                crt++;</div><div class="line">                count += words[crt].length() + <span class="number">1</span>;</div><div class="line">            &#125;</div><div class="line">            <span class="comment">// for the last line</span></div><div class="line">            <span class="keyword">if</span> (crt == words.length - <span class="number">1</span> &amp;&amp; count &lt;= maxWidth + <span class="number">1</span>) &#123;</div><div class="line">                StringBuilder sb = <span class="keyword">new</span> StringBuilder();</div><div class="line">                <span class="keyword">for</span> (<span class="keyword">int</span> i = pre; i &lt; words.length - <span class="number">1</span>; i++) &#123;</div><div class="line">                    sb.append(words[i]).append(<span class="string">' '</span>);</div><div class="line">                &#125;</div><div class="line">                sb.append(words[words.length - <span class="number">1</span>]);</div><div class="line">                result.add(appendSpace(sb.toString(), maxWidth));</div><div class="line">                <span class="keyword">break</span>;</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">if</span> (crt - pre == <span class="number">1</span>) &#123;</div><div class="line">                result.add(appendSpace(words[pre], maxWidth));</div><div class="line">            &#125; <span class="keyword">else</span> &#123;</div><div class="line">                count = count - words[crt].length() - <span class="number">2</span>;</div><div class="line">                <span class="keyword">int</span> realLength = maxWidth - count;</div><div class="line">                <span class="keyword">int</span> spaceCount = realLength / (crt - pre - <span class="number">1</span>) + <span class="number">1</span>;</div><div class="line">                <span class="keyword">int</span> extra = realLength % (crt - pre - <span class="number">1</span>);</div><div class="line">                result.add(getLine(words, pre, crt - pre, spaceCount, extra));</div><div class="line">            &#125;</div><div class="line">            pre = crt;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> String <span class="title">getLine</span><span class="params">(String[] words, <span class="keyword">int</span> start, <span class="keyword">int</span> count, <span class="keyword">int</span> spaceCount, <span class="keyword">int</span> extra)</span> </span>&#123;</div><div class="line">        StringBuilder sb = <span class="keyword">new</span> StringBuilder();</div><div class="line">        StringBuilder _sb = <span class="keyword">new</span> StringBuilder();</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; spaceCount; i++) &#123;</div><div class="line">            _sb.append(<span class="string">' '</span>);</div><div class="line">        &#125;</div><div class="line">        String spaceStr = _sb.toString();</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = start; i &lt; start + count - <span class="number">1</span>; i++) &#123;</div><div class="line">            sb.append(words[i]).append(spaceStr);</div><div class="line">            <span class="keyword">if</span> (extra-- &gt; <span class="number">0</span>) &#123;</div><div class="line">                sb.append(<span class="string">' '</span>);</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        sb.append(words[start + count - <span class="number">1</span>]);</div><div class="line">        <span class="keyword">return</span> sb.toString();</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> String <span class="title">appendSpace</span><span class="params">(String s, <span class="keyword">int</span> maxWidth)</span> </span>&#123;</div><div class="line">        StringBuilder sb = <span class="keyword">new</span> StringBuilder(s);</div><div class="line">        <span class="keyword">while</span> (sb.length() &lt; maxWidth) &#123;</div><div class="line">            sb.append(<span class="string">' '</span>);</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> sb.toString();</div><div class="line">    &#125;</div><div class="line">    <span class="meta">@Test</span></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;</div><div class="line">        String[] words = <span class="keyword">new</span> String[]&#123;<span class="string">"This"</span>, <span class="string">"is"</span>, <span class="string">"an"</span>, <span class="string">"example"</span>, <span class="string">"of"</span>, <span class="string">"text"</span>, <span class="string">"justification."</span>&#125;;</div><div class="line">        List&lt;String&gt; result = fullJustify(words, <span class="number">16</span>);</div><div class="line">        assertSame(<span class="string">"example  of text"</span>, result.get(<span class="number">1</span>));</div><div class="line">        words = <span class="keyword">new</span> String[]&#123;<span class="string">"a"</span>, <span class="string">"b"</span>, <span class="string">"c"</span>, <span class="string">"d"</span>, <span class="string">"e"</span>&#125;;</div><div class="line">        result = fullJustify(words, <span class="number">1</span>);</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
