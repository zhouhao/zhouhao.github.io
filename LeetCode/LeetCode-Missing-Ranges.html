><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="comment">/**</span></div><div class="line"> * Description: Given a sorted integer array where the range of elements are [lower, upper] inclusive, return its</div><div class="line"> * missing ranges.</div><div class="line"> * &lt;p/&gt;</div><div class="line"> * For example, given [0, 1, 3, 50, 75], lower = 0 and upper = 99, return ["2", "4-&gt;49", "51-&gt;74", "76-&gt;99"].</div><div class="line"> * &lt;p/&gt;</div><div class="line"> * http://www.danielbit.com/blog/puzzle/leetcode/leetcode-missing-ranges</div><div class="line"> *</div><div class="line"> * <span class="doctag">@author</span> hzhou</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">MissingRanges</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> List&lt;String&gt; <span class="title">findMissingRanges</span><span class="params">(<span class="keyword">int</span>[] nums, <span class="keyword">int</span> lower, <span class="keyword">int</span> upper)</span> </span>&#123;</div><div class="line">        List&lt;String&gt; result = <span class="keyword">new</span> ArrayList&lt;String&gt;();</div><div class="line">        <span class="keyword">int</span> start = lower - <span class="number">1</span>;</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt;= nums.length; i++) &#123;</div><div class="line">            <span class="keyword">int</span> end = (i == nums.length) ? upper + <span class="number">1</span> : nums[i];</div><div class="line">            <span class="keyword">if</span> (start + <span class="number">2</span> &lt;= end) &#123;</div><div class="line">                result.add(getItem(start + <span class="number">1</span>, end - <span class="number">1</span>));</div><div class="line">            &#125;</div><div class="line">            start = end;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> result;</div><div class="line">    &#125;</div><div class="line">    <span class="function"><span class="keyword">private</span> String <span class="title">getItem</span><span class="params">(<span class="keyword">int</span> start, <span class="keyword">int</span> end)</span> </span>&#123;</div><div class="line">        <span class="keyword">return</span> (start == end) ? String.valueOf(start) : start + <span class="string">"-&gt;"</span> + end;</div><div class="line">    &#125;</div><div class="line">    <span class="meta">@Test</span></div><div class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;</div><div class="line">        <span class="keyword">int</span>[] nums = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">0</span>, <span class="number">1</span>, <span class="number">3</span>, <span class="number">50</span>, <span class="number">75</span>&#125;;</div><div class="line">        List&lt;String&gt; result = findMissingRanges(nums, <span class="number">0</span>, <span class="number">99</span>);</div><div class="line">        <span class="keyword">for</span> (String s : result) &#123;</div><div class="line">            System.out.println(s);</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
