="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="comment">/**</span></div><div class="line"> * Created by hzhou on 2015/5/13.</div><div class="line"> * &lt;p/&gt;</div><div class="line"> * Given a list of non negative integers, arrange them such that they form the largest number.</div><div class="line"> * &lt;p/&gt;</div><div class="line"> * For example, given [3, 30, 34, 5, 9], the largest formed number is 9534330.</div><div class="line"> * &lt;p/&gt;</div><div class="line"> * Note: The result may be very large, so you need to return a string instead of an integer.</div><div class="line"> * &lt;p/&gt;</div><div class="line"> * http://www.programcreek.com/2014/02/leetcode-largest-number-java/</div><div class="line"> */</div><div class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">LargestNumber</span> </span>&#123;</div><div class="line">    <span class="function"><span class="keyword">public</span> String <span class="title">largestNumber</span><span class="params">(<span class="keyword">int</span>[] nums)</span> </span>&#123;</div><div class="line">        <span class="keyword">if</span> (nums == <span class="keyword">null</span> || nums.length == <span class="number">0</span>) &#123;</div><div class="line">            <span class="keyword">return</span> <span class="string">""</span>;</div><div class="line">        &#125;</div><div class="line">        String[] strings = <span class="keyword">new</span> String[nums.length];</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; nums.length; i++) &#123;</div><div class="line">            strings[i] = String.valueOf(nums[i]);</div><div class="line">        &#125;</div><div class="line">        Arrays.sort(strings, <span class="keyword">new</span> Comparator&lt;String&gt;() &#123;</div><div class="line">            <span class="function"><span class="keyword">public</span> <span class="keyword">int</span> <span class="title">compare</span><span class="params">(String o1, String o2)</span> </span>&#123;</div><div class="line">                String s1 = o1 + o2;</div><div class="line">                String s2 = o2 + o1;</div><div class="line">                <span class="keyword">return</span> -<span class="number">1</span> * s1.compareTo(s2);</div><div class="line">            &#125;</div><div class="line">        &#125;);</div><div class="line">        StringBuilder sb = <span class="keyword">new</span> StringBuilder();</div><div class="line">        <span class="keyword">for</span> (String s : strings) &#123;</div><div class="line">            sb.append(s);</div><div class="line">        &#125;</div><div class="line">        String result = sb.toString();</div><div class="line">        <span class="keyword">int</span> i = <span class="number">0</span>;</div><div class="line">        <span class="keyword">while</span> (i &lt; result.length() &amp;&amp; result.charAt(i) == <span class="string">'0'</span>) &#123;</div><div class="line">            i++;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> i == result.length() ? <span class="string">"0"</span> : result.substring(i, result.length());</div><div class="line">    &#125;</div><div class="line">&#125;</div></pre></td></tr></table></figure>
