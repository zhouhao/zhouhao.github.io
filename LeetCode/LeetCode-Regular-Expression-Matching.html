<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> LeetCode: Regular Expression Matching · 疯狂de咸蛋</title><meta name="description" content="LeetCode: Regular Expression Matching - Salty Egg"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="https://hzhou.me/atom.xml" title="疯狂de咸蛋"><script src="//code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/logo.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="/tags/" target="_self" class="nav-list-link">TAG</a></li><li class="nav-list-item"><a href="/about/" target="_self" class="nav-list-link">ABOUT</a></li><li class="nav-list-item"><a href="/LeetCode/" target="_self" class="nav-list-link active">LEETCODE</a></li><li class="nav-list-item"><a href="https://github.com/zhouhao" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"></main><div class="post"><article class="post-block"><h1 class="post-title">LeetCode: Regular Expression Matching</h1><div class="post-info">Jun 24, 2015</div><div class="post-content"> <figure class="highlight java"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div><div class="line">48</div><div class="line">49</div><div class="line">50</div><div class="line">51</div><div class="line">52</div><div class="line">53</div><div class="line">54</div><div class="line">55</div><div class="line">56</div><div class="line">57</div><div class="line">58</div><div class="line">59</div><div class="line">60</div><div class="line">61</div></pre></td><td class="code"><pre><div class="line"></div><div class="line"><span class="comment">/**</span></div><div class="line"> * Created by zhouhao on 5/19/2015.</div><div class="line"> * &lt;p&gt;</div><div class="line"> * Implement regular expression matching with support for '.' and '*'.</div><div class="line"> * &lt;pre&gt;</div><div class="line"> * '.' Matches any single character.</div><div class="line"> * '*' Matches zero or more of the preceding element.</div><div class="line"> *</div><div class="line"> * The matching should cover the entire input string (not partial).</div><div class="line"> *</div><div class="line"> * The function prototype should be:</div><div class="line"> * bool isMatch(const char *s, const char *p)</div><div class="line"> *</div><div class="line"> * Some examples:</div><div class="line"> * isMatch("aa","a") ��? false</div><div class="line"> * isMatch("aa","aa") ��? true</div><div class="line"> * isMatch("aaa","aa") ��? false</div><div class="line"> * isMatch("aa", "a*") ��? true</div><div class="line"> * isMatch("aa", ".*") ��? true</div><div class="line"> * isMatch("ab", ".*") ��? true</div><div class="line"> * isMatch("aab", "c*a*b") ��? true</div><div class="line"> * &lt;/pre&gt;</div><div class="line"> */</div><div class="line"> <span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">RegularExpressionMatching</span> </span>&#123;</div><div class="line">     <span class="function"><span class="keyword">public</span> <span class="keyword">boolean</span> <span class="title">isMatch</span><span class="params">(String s, String p)</span> </span>&#123;</div><div class="line">         <span class="keyword">if</span> (s == <span class="keyword">null</span> || s.isEmpty()) &#123;</div><div class="line">             <span class="keyword">return</span> emptyable(p);</div><div class="line">         &#125;</div><div class="line">         <span class="keyword">if</span> (p == <span class="keyword">null</span> || p.isEmpty()) &#123;</div><div class="line">             <span class="keyword">return</span> <span class="keyword">false</span>;</div><div class="line">         &#125;</div><div class="line">         <span class="keyword">char</span> cs = s.charAt(<span class="number">0</span>);</div><div class="line">         <span class="keyword">char</span> cp = p.charAt(<span class="number">0</span>);</div><div class="line">         <span class="keyword">char</span> tmp = p.length() &gt; <span class="number">1</span> ? p.charAt(<span class="number">1</span>) : <span class="string">'\0'</span>;</div><div class="line">         <span class="keyword">if</span> (tmp == <span class="string">'*'</span>) &#123;</div><div class="line">             <span class="keyword">if</span> (equalChar(cs, cp)) &#123;</div><div class="line">                 <span class="keyword">return</span> isMatch(s.substring(<span class="number">1</span>), p) || isMatch(s, p.substring(<span class="number">2</span>));</div><div class="line">             &#125; <span class="keyword">else</span> &#123;</div><div class="line">                 <span class="keyword">return</span> isMatch(s, p.substring(<span class="number">2</span>));</div><div class="line">             &#125;</div><div class="line">         &#125; <span class="keyword">else</span> &#123;</div><div class="line">             <span class="keyword">return</span> equalChar(cs, cp) &amp;&amp; isMatch(s.substring(<span class="number">1</span>), p.substring(<span class="number">1</span>));</div><div class="line">         &#125;</div><div class="line">     &#125;</div><div class="line">     <span class="function"><span class="keyword">private</span> <span class="keyword">boolean</span> <span class="title">equalChar</span><span class="params">(<span class="keyword">char</span> a, <span class="keyword">char</span> b)</span> </span>&#123;</div><div class="line">         <span class="keyword">return</span> b == <span class="string">'.'</span> || a == b;</div><div class="line">     &#125;</div><div class="line">     <span class="function"><span class="keyword">private</span> <span class="keyword">boolean</span> <span class="title">emptyable</span><span class="params">(String s)</span> </span>&#123;</div><div class="line">         <span class="keyword">if</span> (s == <span class="keyword">null</span> || s.isEmpty()) &#123;</div><div class="line">             <span class="keyword">return</span> <span class="keyword">true</span>;</div><div class="line">         &#125;</div><div class="line">         <span class="keyword">if</span> (s.length() % <span class="number">2</span> != <span class="number">0</span>) &#123;</div><div class="line">             <span class="keyword">return</span> <span class="keyword">false</span>;</div><div class="line">         &#125;</div><div class="line">         <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">1</span>; i &lt; s.length(); i = i + <span class="number">2</span>) &#123;</div><div class="line">             <span class="keyword">if</span> (s.charAt(i) != <span class="string">'*'</span>) <span class="keyword">return</span> <span class="keyword">false</span>;</div><div class="line">         &#125;</div><div class="line">         <span class="keyword">return</span> <span class="keyword">true</span>;</div><div class="line">     &#125;</div><div class="line"> &#125;</div></pre></td></tr></table></figure>
